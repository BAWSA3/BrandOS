<!DOCTYPE html>
<html><head><style>
  body { margin: 0; background: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; }
  button {
    width: 420px;
    font-family: 'VCR OSD Mono', 'Courier New', monospace;
    font-size: 13px;
    letter-spacing: 0.15em;
    color: #ffffff;
    background: #0047FF;
    border: none;
    padding: 1rem;
    border-radius: 10px;
    cursor: pointer;
    box-shadow: 0 4px 24px rgba(0, 71, 255, 0.4), 0 0 48px rgba(0, 71, 255, 0.2);
  }
  button:hover { transform: scale(1.02); }
  button:active { transform: scale(0.98); }
</style></head>
<body>
  <button>RUN ANALYSIS &rarr;</button>
</body></html>
