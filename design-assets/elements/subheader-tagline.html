<!DOCTYPE html>
<html><head><style>
  body { margin: 0; background: #ffffff; display: flex; align-items: center; justify-content: center; height: 100vh; }
  @font-face { font-family: 'M42 Flight 721'; src: local('M42 Flight 721'); }
  .tagline {
    font-family: 'M42 Flight 721', sans-serif;
    font-size: clamp(0.75rem, 1.8vw, 1.1rem);
    letter-spacing: 0.15em;
    color: rgba(0,0,0,0.7);
    white-space: nowrap;
  }
  .cursor { margin-left: 2px; font-weight: 300; animation: blink 1s infinite alternate; }
  @keyframes blink { from { opacity: 1; } to { opacity: 0; } }
</style></head>
<body>
  <div class="tagline">
    Your reputation, decoded<span class="cursor">|</span>
  </div>
</body></html>
